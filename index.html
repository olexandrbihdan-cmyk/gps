<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Truck Tracker Demo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <button id="menu-toggle" class="menu-toggle" onclick="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Lista Pojazdów</h2>
        </div>
        
        <!-- Кнопки експорту/імпорту -->
        <div class="data-management">
            <button class="btn btn-export" onclick="exportAllData()">
                📥 Export Data
            </button>
            <button class="btn btn-import" onclick="importAllData()">
                📤 Import Data
            </button>
        </div>
        
        <div id="truck-list"></div>
    </div>

    <div id="map"></div>

    <div id="detail-panel" class="detail-panel hidden">
        <div class="detail-header">
            <h3 id="detail-title">Pojazd</h3>
            <button class="close-btn" onclick="closeDetailPanel()">&times;</button>
        </div>
        <div class="detail-content">
            <div class="form-group">
                <label>Nazwa pojazdu:</label>
                <input type="text" id="truck_name" class="form-control">
            </div>
            
            <div class="form-group">
                <label>Adres/Lokacja:</label>
                <input type="text" id="address" class="form-control">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Latitude:</label>
                    <input type="number" step="0.000001" id="latitude" class="form-control" onchange="updateMarkerFromCoords()">
                </div>
                
                <div class="form-group">
                    <label>Longitude:</label>
                    <input type="number" step="0.000001" id="longitude" class="form-control" onchange="updateMarkerFromCoords()">
                </div>
            </div>
            
            <div class="form-group datetime-group">
                <label>Data/Czas:</label>
                <div class="datetime-wrapper">
                    <input type="text" id="datetime" class="form-control">
                    <button class="btn-update-time" onclick="updateDateTime()" title="Aktualizuj czas">
                        🕐
                    </button>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Prędkość (km/h):</label>
                    <input type="text" id="speed" class="form-control">
                </div>
                
                <div class="form-group">
                    <label>Status Jazdy:</label>
                    <input type="text" id="driving_status" class="form-control" placeholder="00:00:00">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Licznik (km):</label>
                    <input type="text" id="odometer" class="form-control">
                </div>
                
                <div class="form-group">
                    <label>Obroty (r/min):</label>
                    <input type="text" id="rpm" class="form-control">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Napięcie (V):</label>
                    <input type="text" id="voltage" class="form-control">
                </div>
                
                <div class="form-group">
                    <label>Satelity:</label>
                    <input type="text" id="satellites" class="form-control">
                </div>
            </div>
            
            <div class="form-group">
                <label>Paliwo (L):</label>
                <input type="text" id="fuel" class="form-control">
            </div>
            
            <div class="form-group">
                <label>Informacje o kierowcy/trasie:</label>
                <textarea id="driver_info" class="form-control" rows="3"></textarea>
            </div>
            
            <div class="button-group">
                <button class="btn btn-save" onclick="saveTruck()">Zapisz</button>
                <button class="btn btn-delete" onclick="confirmDelete()">Usuń</button>
                <button class="btn btn-cancel" onclick="closeDetailPanel()">Anuluj</button>
            </div>
            
            <!-- Кнопки експорту/імпорту в панелі деталей -->
            <div class="data-management-panel">
                <button class="btn btn-export-small" onclick="exportAllData()">
                    📥 Export All
                </button>
                <button class="btn btn-import-small" onclick="importAllData()">
                    📤 Import
                </button>
            </div>
            
            <div class="trajectory-controls">
                <button class="btn btn-trajectory-edit" onclick="toggleEditTrajectory()">
                    📍 Edit Trajectory
                </button>
                <button class="btn btn-trajectory-show" onclick="toggleTrajectoryVisibility()">
                    👁️ Show Trajectory
                </button>
                <button class="btn btn-trajectory-clear" onclick="clearTrajectory()">
                    🗑️ Clear Trajectory
                </button>
            </div>
        </div>
    </div>

    <div id="hover-card" class="hover-card hidden"></div>

    <div id="mobile-card-backdrop" class="mobile-card-backdrop" onclick="closeMobileCard()"></div>
    
    <!-- Мінімальна панель редагування траєкторії -->
    <div id="trajectory-edit-panel" class="trajectory-edit-panel hidden">
        <div class="trajectory-panel-header">
            <h3>Trajectory: <span id="trajectory-truck-name"></span></h3>
            <button class="close-panel" onclick="closeTrajectoryEditPanel()">×</button>
        </div>
        <div class="trajectory-panel-buttons">
            <button class="btn btn-trajectory-save" onclick="saveAndExitEditMode()">
                📍 Save and Exit Edit Mode
            </button>
            <button class="btn btn-trajectory-show" onclick="toggleTrajectoryVisibility()">
                👁️ Show Trajectory
            </button>
            <button class="btn btn-trajectory-clear" onclick="clearTrajectory()">
                🗑️ Clear Trajectory
            </button>
        </div>
    </div>
    
    <div id="trajectory-hint" class="trajectory-hint hidden">
        Click on the map to add trajectory points. Drag points to adjust them. Right-click to delete.
    </div>
    
    <div id="point-time-editor" class="point-time-editor hidden">
        <div class="time-editor-content">
            <label>Date & Time:</label>
            <input type="datetime-local" id="point-datetime-input" class="form-control">
            <div class="time-editor-buttons">
                <button class="btn-small btn-save" onclick="savePointTime()">✓</button>
                <button class="btn-small btn-clear" onclick="clearPointTime()">✗</button>
            </div>
        </div>
    </div>
    
    <div id="trajectory-tooltip" class="trajectory-tooltip hidden">
        <span id="tooltip-time"></span>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="import-file-input" accept=".json" style="display: none;" onchange="handleImportFile(event)">
    
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Potwierdzenie</h3>
            <p>Czy na pewno chcesz usunąć ten pojazd?</p>
            <div class="modal-buttons">
                <button class="btn btn-delete" onclick="deleteTruck()">Usuń</button>
                <button class="btn btn-cancel" onclick="closeConfirmModal()">Anuluj</button>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/trajectory.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAswIkVsNbCGVderLW6M70L_fCcmNMpR7A&callback=initMap&libraries=places" async defer></script>
</body>
</html>
